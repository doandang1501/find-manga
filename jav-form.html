<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Save JAV — FindManga</title>
  <link rel="stylesheet" href="jav-form.css" />
</head>
<body>

  <div class="noise"></div>

  <div class="window">
    <header>
      <span class="logo">Save JAV</span>
      <button id="btn-close" class="close-btn" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </header>

    <div class="body">

      <!-- Thumbnail paste zone -->
      <div class="field">
        <label>Thumbnail <span class="hint">Ctrl+V to paste image from clipboard</span></label>
        <div id="paste-zone" class="paste-zone" tabindex="0">
          <div id="paste-placeholder" class="paste-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>Paste image here</span>
            <span class="paste-sub">Ctrl + V</span>
          </div>
          <img id="thumb-preview" class="thumb-preview hidden" alt="thumbnail" />
          <button id="btn-clear-thumb" class="clear-thumb hidden" title="Remove">×</button>
        </div>
      </div>

      <!-- JAV Code -->
      <div class="field">
        <label>JAV Code <span class="required">*</span></label>
        <input id="input-code" type="text" placeholder="e.g. ABC-123" maxlength="32" autocomplete="off" />
      </div>

      <!-- Tag (optional) -->
      <div class="field">
        <label>Tag <span class="hint">optional</span></label>
        <div class="tag-row">
          <select id="select-tag">
            <option value="">— No tag —</option>
          </select>
          <span class="or">or</span>
          <input id="input-new-tag" type="text" placeholder="New tag..." maxlength="24" />
        </div>
      </div>

    </div>

    <footer>
      <button id="btn-cancel" class="btn-secondary">Cancel</button>
      <button id="btn-save"   class="btn-primary">Save</button>
    </footer>
  </div>

  <script src="jav-form.js"></script>
</body>
</html>
